<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title> Tic Tac Toe – Sanrio Edition</title>
  <meta name="description" content="A cute kawaii claymorphism Tic Tac Toe game featuring Hello Kitty and Cinnamoroll. Play now!" />
  <meta name="keywords" content="tic-tac-toe, game, hello-kitty, cinnamoroll, kawaii, sanrio, interactive" />
  <meta name="author" content="Sanrio Tic Tac Toe" />
  <meta name="theme-color" content="#F7C8D0" />
  <meta property="og:title" content="Tic Tac Toe – Sanrio Edition" />
  <meta property="og:description" content="A cute kawaii claymorphism Tic Tac Toe game featuring Hello Kitty and Cinnamoroll." />
  <meta property="og:type" content="website" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Tic Tac Toe – Sanrio Edition" />
  <meta name="twitter:description" content="Play this adorable Tic Tac Toe game with Hello Kitty and Cinnamoroll!" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎀</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<div class="app">

  <!-- TITLE -->
  <div class="title-wrap">
    <h1>Tic <span>Tac</span> Toe</h1>
    <p class="title-sub">✿ Sanrio edition ✿</p>
  </div>

  <!-- PLAYERS PILL -->
  <div class="players-pill" role="region" aria-label="Player indicators">
    <!-- Player 1 – Hello Kitty -->
    <div class="player-card active-p" id="card-p1">
      <img class="player-avatar" src="assets/hello_kitty_character.png" alt="Hello Kitty" />
      <div class="player-info">
        <span class="player-label">Player 1</span>
        <span class="player-name">Hello Kitty</span>
      </div>
    </div>

    <div class="vs-badge">VS</div>

    <!-- Player 2 – Cinnamoroll -->
    <div class="player-card" id="card-p2">
      <div class="player-info" style="align-items:flex-end">
        <span class="player-label">Player 2</span>
        <span class="player-name">Cinnamoroll</span>
      </div>
      <img class="player-avatar" src="assets/cinnamoroll_player.png" alt="Cinnamoroll" />
    </div>
  </div>

  <!-- STATUS BUBBLE -->
  <div class="status-bubble" id="statusBubble" role="status" aria-live="polite">
    🎀 Hello Kitty's Turn!
  </div>

  <!-- BOARD -->
  <div class="board-wrap">
    <div class="grid-overlay" id="grid" role="grid" aria-label="Tic Tac Toe grid"></div>
  </div>

  <!-- BUTTON -->
  <div class="buttons">
    <button class="clay-btn state-new" id="mainBtn" aria-label="New Game">
      <span class="btn-icon">✦</span>
      <span id="btnLabel">New Game</span>
    </button>
  </div>

</div><!-- /.app -->

<script src="app.js"></script>
</body>
</html>
